<!DOCTYPE html>
<html>

<head>
    <title>Calculator</title>
</head>

<body>
    <h1>Calculator</h1>
    <form id="calcForm">
        <label>First Number: </label>
        <input type="number" id="num1" required>
        <br><br>
        <label>Second Number: </label>
        <input type="number" id="num2" required>
        <br><br>
        <button type="button" onclick="calculate('add')">Add</button>
        <button type="button" onclick="calculate('subtract')">Subtract</button>
        <button type="button" onclick="calculate('multiply')">Multiply</button>
        <button type="button" onclick="calculate('divide')">Divide</button>
        <br><br>
        <label>Result: </label>
        <output id="result"></output>
    </form>

    <script>
        function calculate(operation) {
            let n1 = parseFloat(document.getElementById("num1").value);
            let n2 = parseFloat(document.getElementById("num2").value);
            let result;

            if (isNaN(n1) || isNaN(n2)) {
                document.getElementById("result").value = "Please enter valid numbers";
                return;
            }

            switch (operation) {
                case 'add':
                    result = n1 + n2;
                    break;
                case 'subtract':
                    result = n1 - n2;
                    break;
                case 'multiply':
                    result = n1 * n2;
                    break;
                case 'divide':
                    if (n2 === 0) {
                        result = "Error: Division by 0";
                    } else {
                        result = n1 / n2;
                    }
                    break;
            }

            document.getElementById("result").value = result;
        }
    </script>
</body>

</html>
