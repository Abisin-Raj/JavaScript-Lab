<!DOCTYPE html>
<html>

<head>
    <title>Number Checker</title>
</head>

<body>
    <h2>Perfect, Abundant, or Deficient Number Checker</h2>
    <p>Input number in the prompt box</p>
    <script>
        const numberInput = prompt("Enter a positive integer: ");
        const number = parseInt(numberInput);

        if (isNaN(number) || number < 1) {
            alert("Invalid Input. Number is less than 1");
        } else {
            let sumDivisors = 0;
            for (let i = 1; i <= number / 2; i++) {
                if (number % i === 0) {
                    sumDivisors += i;
                }
            }

            if (sumDivisors === number) {
                alert(`${number} is a Perfect Number.`);
            } else if (sumDivisors > number) {
                alert(`${number} is an Abundant Number.`);
            } else {
                alert(`${number} is a Deficient Number.`);
            }
        }
    </script>
</body>

</html>
