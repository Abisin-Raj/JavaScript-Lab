<!DOCTYPE html>
<html>

<head>
    <title>Nth Prime Number</title>
</head>

<body>
    <h1>Find the Nth Prime Number</h1>
    <label>Enter a positive number (n): </label>
    <input type="number" id="nValue" min="1">
    <button onclick="findNthPrime()">Find Prime</button>
    <h2 id="result"></h2>

    <script>
        function isPrime(num) {
            if (num < 2)
                return false;
            for (let i = 2; i <= Math.sqrt(num); i++) {
                if (num % i === 0)
                    return false;
            }
            return true;
        }

        function findNthPrime() {
            let n = parseInt(document.getElementById("nValue").value);

            if (isNaN(n) || n <= 0) {
                document.getElementById("result").innerHTML =
                    "Please enter a positive integer greater than 0.";
                return;
            }

            let count = 0;
            let num = 1;
            while (count < n) {
                num++;
                if (isPrime(num)) {
                    count++;
                }
            }

            document.getElementById("result").innerHTML =
                `The ${n}th prime number is <b>${num}</b>`;
        }
    </script>
</body>

</html>
